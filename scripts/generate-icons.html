<!DOCTYPE html>
<html>
<body>
<script>
function generateIcon(size) {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#7C3AED';
  ctx.fill();

  const s = size / 16;
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath();
  ctx.moveTo(s*9, s*2);
  ctx.lineTo(s*5.5, s*2);
  ctx.quadraticCurveTo(s*4, s*2, s*4, s*3.5);
  ctx.lineTo(s*4, s*12.5);
  ctx.quadraticCurveTo(s*4, s*14, s*5.5, s*14);
  ctx.lineTo(s*10.5, s*14);
  ctx.quadraticCurveTo(s*12, s*14, s*12, s*12.5);
  ctx.lineTo(s*12, s*4.5);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#7C3AED';
  ctx.lineWidth = Math.max(1, size / 16);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(s*6, s*9);
  ctx.lineTo(s*10, s*9);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(s*6, s*11);
  ctx.lineTo(s*8, s*11);
  ctx.stroke();

  return canvas.toDataURL('image/png');
}

[16, 48, 128].forEach(size => {
  const dataUrl = generateIcon(size);
  const link = document.createElement('a');
  link.download = `icon${size}.png`;
  link.href = dataUrl;
  document.body.appendChild(link);
  const img = document.createElement('img');
  img.src = dataUrl;
  img.style.margin = '10px';
  document.body.appendChild(img);
  document.body.appendChild(document.createTextNode(` icon${size}.png `));
  document.body.appendChild(document.createElement('br'));
});
</script>
<p>Right-click each image and Save As to icons/ folder, or use the download links above.</p>
</body>
</html>
